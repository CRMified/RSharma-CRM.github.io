<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thank You | Oakton College</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green:      #005C56;
      --green-dark: #1e5c2e;
      --green-light:#E8F4EE;
      --gray-bg:    #EBEBEB;
      --gray-border:#CCCCCC;
      --gray-label: #222222;
      --gray-muted: #666666;
      --white:      #FFFFFF;
      --radius:     4px;
    }

    body {
      font-family: Arial, 'Helvetica Neue', sans-serif;
      background: var(--gray-bg);
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 2rem 1rem 3rem;
    }

    .card {
      width: 100%;
      max-width: 760px;
      border-radius: 6px;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(0,0,0,.12);
    }

    /* HEADER */
    .card-header {
      background: var(--white);
      border-bottom: 3px solid var(--green);
      padding: 1.5rem 2rem 1.8rem;
    }
    .logo {
      display: flex;
      align-items: center;
      margin-bottom: 1.3rem;
      text-decoration: none;
    }
    .logo img { height: 56px; width: auto; display: block; }
    .card-header h1 {
      color: var(--green);
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: .5rem;
    }
    .card-header p {
      color: var(--gray-muted);
      font-size: .92rem;
      line-height: 1.5;
    }

    /* CONFIRMATION BODY */
    .card-body {
      background: var(--white);
      padding: 2.2rem 2rem 2.5rem;
    }

    /* Checkmark icon */
    .success-icon {
      width: 60px;
      height: 60px;
      background: var(--green-light);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1.4rem;
    }
    .success-icon svg {
      width: 30px;
      height: 30px;
    }

    .confirm-message {
      font-size: 1.05rem;
      color: var(--gray-label);
      line-height: 1.65;
      margin-bottom: 2rem;
      max-width: 580px;
    }
    .confirm-message strong {
      color: var(--green);
    }

    /* Divider */
    .divider {
      border: none;
      border-top: 1px solid var(--gray-border);
      margin-bottom: 1.5rem;
    }

    /* Resources section */
    .resources-heading {
      font-size: .85rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--gray-muted);
      margin-bottom: 1rem;
    }

    .resource-links {
      display: flex;
      flex-direction: column;
      gap: .65rem;
    }
    .resource-link {
      display: flex;
      align-items: center;
      gap: .75rem;
      padding: .85rem 1rem;
      border: 1.5px solid var(--gray-border);
      border-radius: var(--radius);
      text-decoration: none;
      color: var(--gray-label);
      font-size: .92rem;
      font-weight: 700;
      transition: border-color .15s, background .15s, color .15s;
    }
    .resource-link:hover {
      border-color: var(--green);
      background: var(--green-light);
      color: var(--green);
    }
    .resource-link .link-icon {
      width: 34px;
      height: 34px;
      background: var(--green-light);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background .15s;
    }
    .resource-link:hover .link-icon {
      background: rgba(44,122,62,.18);
    }
    .resource-link .link-icon svg {
      width: 16px;
      height: 16px;
    }
    .resource-link .link-arrow {
      margin-left: auto;
      color: var(--green);
      font-size: 1rem;
    }

    /* Back link */
    .back-wrap {
      margin-top: 1.8rem;
      text-align: center;
    }
    .back-link {
      color: var(--gray-muted);
      font-size: .82rem;
      text-decoration: none;
    }
    .back-link:hover { color: var(--green); text-decoration: underline; }

    @media (max-width: 520px) {
      .card-body { padding: 1.5rem 1.2rem 2rem; }
      .card-header { padding: 1.2rem 1.2rem 1.5rem; }
    }
  </style>
</head>
<body>

<div class="card">

  <!-- Header -->
  <div class="card-header">
    <a href="web-to-lead.html" class="logo">
      <img src="https://www.oakton.edu/_global/images/logo/logo-green.jpg" alt="Oakton College">
    </a>
    <h1>Partner With Us</h1>
    <p>Thank you for reaching out to Oakton College.</p>
  </div>

  <!-- Confirmation Body -->
  <div class="card-body">

    <div class="success-icon">
      <svg viewBox="0 0 30 30" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="15" cy="15" r="14" stroke="#2C7A3E" stroke-width="2"/>
        <path d="M8 15.5l5 5 9-10" stroke="#2C7A3E" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>

    <p class="confirm-message" id="confirmMsg">
      <!-- Filled by JS -->
    </p>

    <hr class="divider">

    <div class="resources-heading">Helpful Resources</div>

    <div class="resource-links">
      <a href="https://www.oakton.edu/audiences/corporate-partners.php" class="resource-link">
        <span class="link-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="#2C7A3E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
            <circle cx="9" cy="7" r="4"/>
            <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
            <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
          </svg>
        </span>
        Explore Partnership Programs
        <span class="link-arrow">→</span>
      </a>
      <a href="https://www.oakton.edu/academics/continuing-education/index.php" class="resource-link">
        <span class="link-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="#2C7A3E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
            <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
          </svg>
        </span>
        View Workforce Training Options
        <span class="link-arrow">→</span>
      </a>
    </div>

    <div class="back-wrap">
      <a href="web-to-lead.html" class="back-link">← Submit another request</a>
    </div>

  </div>
</div>

<script>
  // Read ?name= from URL and build the confirmation message
  const params = new URLSearchParams(window.location.search);
  const name   = params.get('name');
  const el     = document.getElementById('confirmMsg');

  if (name) {
    el.innerHTML =
      'Thank you <strong>' + name + '</strong> for connecting with Oakton Collage. ' +
      'A member of our team will follow up within 2 business days.';
  } else {
    el.innerHTML =
      'Thank you for connecting with Oakton College. ' +
      'A member of our team will follow up within 2 business days.';
  }
</script>

</body>
</html>
